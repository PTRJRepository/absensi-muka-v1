<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTRJ - Absensi Monitoring</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#071426;--green:#167A3A;--green-light:#1a9a4a;--bg:#F1F5F9;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--danger:#dc2626;--warning:#d97706;--success:#16a34a}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--navy);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto}
.sidebar .logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px}
.sidebar .logo h1{font-size:15px;font-weight:700;line-height:1.3}
.sidebar .logo span{display:block;font-size:11px;font-weight:400;opacity:.6}
.sidebar nav{flex:1;padding:16px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--green)}
.nav-item i{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;opacity:.4}
.main{flex:1;margin-left:240px;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px;font-weight:600}
.topbar .actions{display:flex;gap:10px;align-items:center}
.breadcrumb{font-size:12px;color:var(--muted)}
.content{padding:28px;flex:1}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:24px;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:15px;font-weight:600;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:var(--green-light)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-gray{background:#f1f5f9;color:#475569}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px}
.stat-card .stat-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-card .stat-value{font-size:28px;font-weight:700;color:var(--text)}
.stat-card .stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-card.green{border-left:4px solid var(--green)}
.stat-card.red{border-left:4px solid var(--danger)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8fafc}
.text-green{color:var(--green)}
.text-red{color:var(--danger)}
.text-muted{color:var(--muted)}
.text-sm{font-size:12px}
.flex{display:flex;align-items:center;gap:8px}
.gap-2{gap:8px}
.mt-4{margin-top:16px}
.mb-4{margin-bottom:16px}
.loading{text-align:center;padding:40px;color:var(--muted)}
.loading::after{content:" ";display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:14px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:1000;box-shadow:0 4px 12px rgba(0,0,0,.2);display:none}
.toast.show{display:block}
.toast.success{border-left:4px solid var(--green)}
.toast.error{border-left:4px solid var(--danger)}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state i{width:48px;height:48px;margin:0 auto 12px;opacity:.4}
.empty-state p{font-size:14px}
select,input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text)}
select:focus,input:focus{outline:none;border-color:var(--green)}
.filter-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 12px}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.pagination-info{font-size:12px;color:var(--muted)}
.pagination-btns{display:flex;gap:6px}
.page-btn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;background:var(--card)}
.page-btn:hover{background:var(--bg)}
.page-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.toggle-btn{display:inline-flex;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.toggle-btn button{padding:7px 16px;font-size:12px;font-weight:500;border:none;background:var(--card);cursor:pointer;transition:all .15s;color:var(--muted)}
.toggle-btn button.active{background:var(--green);color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:800px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-container{position:relative;height:280px}
.info-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;font-size:13px;color:#166534;display:flex;align-items:flex-start;gap:8px;margin-bottom:16px}
.info-box i{flex-shrink:0;margin-top:2px}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:13px;color:#92400e;display:flex;align-items:flex-start;gap:8px;margin-bottom:16px}
.warn-box i{flex-shrink:0;margin-top:2px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.stat-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
