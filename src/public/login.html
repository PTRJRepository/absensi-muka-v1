<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PTRJ Absensi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#071426;--green:#167A3A;--green-light:#1a9a4a;--bg:#F1F5F9;--text:#1e293b;--muted:#64748b}
body{font-family:"Inter",sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:32px}
.logo h2{font-size:22px;font-weight:700;color:var(--navy)}
.logo span{display:block;font-size:12px;color:var(--muted);margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.form-group input{width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;transition:border-color .15s}
.form-group input:focus{outline:none;border-color:var(--green)}
.btn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff}
.btn:hover{background:var(--green-light)}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.error-msg{background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h2>PTRJ Absensi</h2>
    <span>Monitoring System v2.0</span>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password" required>
    </div>
    <button type="submit" class="btn" id="loginBtn">Masuk</button>
  </form>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled = true; btn.textContent = 'Memuat...';
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value})
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username || document.getElementById('username').value);
      window.location.href = '/dashboard.html';
    } else {
      err.textContent = data.error || 'Login gagal.'; err.style.display = 'block';
    }
  } catch(e) { err.textContent = 'Tidak dapat terhubung ke server.'; err.style.display = 'block';
  } finally { btn.disabled = false; btn.textContent = 'Masuk'; }
}
</script>
</body>
</html>
